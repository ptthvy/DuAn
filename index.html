<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Photo Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Interactive Photo Gallery</h1>

<div id="image">
    Hover over an image below to display here.
</div>

<div class="gallery">

    <img src="https://picsum.photos/id/1015/300/200"
         alt="Mountain landscape with river"
         onmouseover="upDate(this)"
         onmouseleave="undo()">

    <img src="https://picsum.photos/id/1025/300/200"
         alt="Golden retriever dog portrait"
         onmouseover="upDate(this)"
         onmouseleave="undo()">

    <img src="https://picsum.photos/id/1035/300/200"
         alt="Beach sunset with orange sky"
         onmouseover="upDate(this)"
         onmouseleave="undo()">

    <img src="https://picsum.photos/id/1043/300/200"
         alt="Forest pathway with sunlight"
         onmouseover="upDate(this)"
         onmouseleave="undo()">

</div>

<script>

function upDate(previewPic) {

    console.log("Event triggered");
    console.log("Alt text:", previewPic.alt);
    console.log("Image source:", previewPic.src);

    let imageDiv = document.getElementById("image");

    imageDiv.innerHTML = previewPic.alt;
    imageDiv.style.backgroundImage = "url('" + previewPic.src + "')";
}

function undo() {

    console.log("Mouse left image");

    let imageDiv = document.getElementById("image");

    imageDiv.style.backgroundImage = "url('')";
    imageDiv.innerHTML = "Hover over an image below to display here.";
}

</script>

</body>
</html>
